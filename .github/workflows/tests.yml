name: .NET Core CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Backend (Current Repo)
      uses: actions/checkout@v4
      with:
        path: GoreBackend

    - name: Checkout Frontend Repo
      uses: actions/checkout@v4
      with:
        repository: TPO-dream-team/GoreFrontend
        path: GoreFrontend

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'
        cache-dependency-path: GoreFrontend/package-lock.json

    - name: Restore and Build Backend
      working-directory: GoreBackend
      run: |
        dotnet restore
        dotnet build --no-restore --configuration Release

    - name: Run Backend Unit Tests
      id: test_step
      working-directory: GoreBackend
      continue-on-error: true
      run: |
        dotnet test --no-build --configuration Release \
        --logger "trx;LogFileName=results.trx" \
        --settings .runsettings \
        --collect:"XPlat Code Coverage" \
        --results-directory ./TestResults

    - name: Generate Coverage Summary
      uses: irongut/CodeCoverageSummary@v1.3.0
      with:
        filename: 'GoreBackend/TestResults/**/*.cobertura.xml'
        badge: true
        format: markdown
        output: both

    - name: Write Results to Summary
      if: always()
      run: |
        echo "## Code Coverage" >> $GITHUB_STEP_SUMMARY
        cat code-coverage-results.md >> $GITHUB_STEP_SUMMARY

    # --- Playwright E2E Section ---

    - name: Install Frontend Dependencies
      run: npm ci
      working-directory: GoreFrontend

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
      working-directory: GoreFrontend

    - name: Pre-pull Postgres Image
      run: docker pull postgres:17-alpine

    - name: Run E2E Tests
      run: npm run E2E
      working-directory: GoreFrontend
      env:
        TESTCONTAINERS_RYUK_DISABLED: false

    - name: Upload Playwright Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: playwright-report
        path: GoreFrontend/playwright-report/
        retention-days: 30

    # --- Final Status Check ---

    - name: Check Backend Test Status
      if: steps.test_step.outcome == 'failure'
      run: |
        echo "::error::Backend Unit Tests failed. Check the Job Summary."
        exit 1