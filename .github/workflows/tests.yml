name: .NET Core CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore and Build
      run: |
        dotnet restore
        dotnet build --no-restore --configuration Release

    - name: Test
      id: test_step
      continue-on-error: true
      run: |
        dotnet test --no-build --configuration Release \
        --logger "trx;LogFileName=results.trx" \
        --collect:"XPlat Code Coverage" \
        --results-directory ./TestResults

    - name: Generate Coverage Summary
      uses: irongut/CodeCoverageSummary@v1.3.0
      with:
        filename: 'TestResults/**/*.cobertura.xml'
        badge: true
        format: markdown
        output: both

    - name: Write Results to Summary
      if: always()
      run: |
        echo "##Code Coverage" >> $GITHUB_STEP_SUMMARY
        cat code-coverage-results.md >> $GITHUB_STEP_SUMMARY
        
    # 3. Fail the build if tests failed (after writing the summary)
    - name: Check Test Status
      if: steps.test_step.outcome == 'failure'
      run: |
        echo "::error::Tests failed. Scroll up to the Job Summary to see coverage."
        exit 1